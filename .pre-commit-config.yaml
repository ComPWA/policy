ci:
  autofix_commit_msg: "MAINT: implement pre-commit autofixes"
  autoupdate_commit_msg: "MAINT: upgrade lock files"
  autoupdate_schedule: quarterly
  skip:
    - check-dev-files
    - self-check
    - tombi-format
    - tombi-lint
    - ty

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: local
    hooks:
      - id: check-dev-files
        name: Check developer config files in the repository
        entry: check-dev-files
        language: python
        files: >-
          (?x)^(
            (.*/)?_quarto\.yml|
            (.*/)?Manifest\.toml|
            (.*/)?requirements.*\.(in|txt)|
            .*\.toml|
            \.binder/.*|
            \.constraints/.*|
            \.cspell\.json|
            \.editorconfig|
            \.envrc|
            \.flake8|
            \.gitattributes|
            \.github/.*|
            \.gitignore|
            \.gitpod\.yml|
            \.markdownlint\.json|
            \.markdownlint\.yaml|
            \.pre\-commit\-config\.yaml|
            \.prettierignore|
            \.pydocstyle|
            \.pylintrc|
            \.python\-version|
            \.readthedocs\.yml|
            \.taplo\.toml|
            \.tombi\.toml|
            \.vscode/.*|
            \.zenodo\.json|
            CITATION\.cff|
            codecov\.yml|
            commitlint\.config\.js|
            CONTRIBUTING\.md|
            cspell\.json|
            doc/_relink_references\.py|
            docs/\.pydocstyle|
            docs/_relink_references\.py|
            docs/conf\.py|
            environment\.yml|
            labels\.toml|
            pixi\.lock|
            pixi\.toml|
            pyproject\.toml|
            pyrightconfig\.json|
            pytest\.ini|
            README\.md|
            taplo\.toml|
            tests/\.pydocstyle|
            tombi\.toml|
            ty\.toml|
            uv\.lock
          )$
        pass_filenames: false
      - id: self-check
        name: self-check
        entry: self-check
        language: python
        files: >-
          (?x)^(
            \.pre\-commit\-(config|hooks)\.yaml|
            tests/utilities/precommit/\.pre\-commit\-config\.yaml
          )$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: name-tests-test
        name: Tests should start with test_
        args: ["--django"]
      - id: trailing-whitespace

  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: v1.2.0
    hooks:
      - id: tombi-format
      - id: tombi-lint
        args: [--error-on-warnings]

  - repo: https://github.com/ComPWA/prettier-pre-commit
    rev: v3.8.1
    hooks:
      - id: prettier

  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v10.0.1
    hooks:
      - id: cspell
        language_version: 25.9.0

  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
        name: editorconfig
        alias: ec
        exclude: >-
          (?x)^(
            .*\.py
          )$

  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.59
    hooks:
      - id: ty
        args: [--group=types, --no-default-groups]
