# Example config for tests
ci:
  autoupdate_schedule: quarterly
  skip:
    - mypy

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: https://github.com/ComPWA/policy
    rev: 0.3.0
    hooks:
      - id: check-dev-files
        name: Check developer config files in the repository
        entry: check-dev-files
        language: python
        files: >-
          (?x)^(
            (.*/)?_quarto\.yml|
            (.*/)?Manifest\.toml|
            (.*/)?requirements.*\.(in|txt)|
            \.binder/.*|
            \.constraints/.*|
            \.cspell\.json|
            \.editorconfig|
            \.envrc|
            \.flake8|
            \.gitattributes|
            \.github/.*|
            \.gitignore|
            \.gitpod\.yml|
            \.markdownlint\.json|
            \.markdownlint\.yaml|
            \.pre\-commit\-config\.yaml|
            \.prettierignore|
            \.pydocstyle|
            \.pylintrc|
            \.python\-version|
            \.readthedocs\.yml|
            \.taplo\.toml|
            \.tombi\.toml|
            \.vscode/.*|
            \.zenodo\.json|
            CITATION\.cff|
            codecov\.yml|
            commitlint\.config\.js|
            CONTRIBUTING\.md|
            cspell\.json|
            doc/_relink_references\.py|
            docs/\.pydocstyle|
            docs/_relink_references\.py|
            docs/conf\.py|
            environment\.yml|
            labels\.toml|
            pixi\.lock|
            pixi\.toml|
            pyproject\.toml|
            pyrightconfig\.json|
            pytest\.ini|
            README\.md|
            taplo\.toml|
            tests/\.pydocstyle|
            tombi\.toml|
            ty\.toml|
            uv\.lock
          )$
        pass_filenames: false
        args:
          - --no-prettierrc

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        require_serial: true
        types:
          - python
